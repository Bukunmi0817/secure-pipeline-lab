name: Security Scan

on: [push, pull_request]

jobs:
  secrets-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --staged --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  code-scan:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      - name: Run Bandit
        # This scans the directory and fails if it finds High Severity issues
        run: bandit -r . -ll
